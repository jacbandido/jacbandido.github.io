<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andean - Empresa de Prueba</title>
  <style>
    /* Estilos generales */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      color: #333;
    }

    header {
      background-color: #2c3e50;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    main {
      padding: 40px 20px;
      text-align: center;
    }

    main h2 {
      color: #2c3e50;
    }

    main p {
      max-width: 600px;
      margin: 20px auto;
      line-height: 1.6;
    }

    footer {
      background-color: #34495e;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    /* Botón de prueba */
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #e67e22;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: #d35400;
    }
  </style>
</head>
<body>
  <header>
    <h1>Andean</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <main>
    <h2>Bienvenido a Andean</h2>
    <p>Esta es una página de prueba para nuestra empresa Andean. Aquí podemos mostrar nuestros servicios, proyectos y contacto de manera profesional y clara.</p>
    <a href="#" class="btn">Saber más</a>
  </main>

  <footer>
    &copy; 2026 Andean. Todos los derechos reservados.
  </footer>
</body>
</html>
